    <!-- Vapi Script -->
    <script>
      var vapiInstance = null;
      const assistant = "fb6889ad-fa78-4ddb-abe9-4693d0586173"; // Substitute with your assistant ID
      const apiKey = "c820f00f-a0db-42fd-b7d4-b7314ab7ad5c"; // Substitute with your Public key from Vapi Dashboard.
      const buttonConfig = {
        position: "bottom-right",
        offset: "40px",
        width: "80px",
        height: "80px",
        idle: {
          color: {
            50: "#f0fdf4",
            100: "#dcfce7", 
            200: "#bbf7d0",
            300: "#86efac",
            400: "#4ade80",
            500: "#22c55e",
            600: "#16a34a",
            700: "#15803d",
            800: "#166534",
            900: "#14532d",
            950: "#052e16"
          },
          type: "pill",
          title: "Ask Rob",
          subtitle: "CNZA Journalist",
          icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="paperGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#f8fafc;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
              </linearGradient>
              <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
                <feDropShadow dx="1" dy="2" stdDeviation="1" flood-color="#000000" flood-opacity="0.3"/>
              </filter>
            </defs>
            <!-- Background pages (3D effect) -->
            <rect x="3" y="5" width="16" height="18" rx="1" fill="#22c55e" opacity="0.3" transform="rotate(-2)"/>
            <rect x="2.5" y="4.5" width="16" height="18" rx="1" fill="#34d399" opacity="0.5" transform="rotate(-1)"/>
            <!-- Main newspaper -->
            <rect x="2" y="4" width="16" height="18" rx="1" fill="url(#paperGradient)" stroke="#22c55e" stroke-width="1" filter="url(#shadow)"/>
            <!-- Header line -->
            <line x1="4" y1="7" x2="16" y2="7" stroke="#22c55e" stroke-width="2"/>
            <!-- Title CNZA -->
            <text x="10" y="10" text-anchor="middle" fill="#22c55e" font-size="4" font-weight="bold">CNZA</text>
            <!-- Content lines -->
            <line x1="4" y1="12" x2="14" y2="12" stroke="#64748b" stroke-width="0.8"/>
            <line x1="4" y1="14" x2="16" y2="14" stroke="#64748b" stroke-width="0.8"/>
            <line x1="4" y1="16" x2="12" y2="16" stroke="#64748b" stroke-width="0.8"/>
            <line x1="4" y1="18" x2="15" y2="18" stroke="#64748b" stroke-width="0.8"/>
            <line x1="4" y1="20" x2="10" y2="20" stroke="#64748b" stroke-width="0.8"/>
          </svg>`
        },
        loading: {
          color: {
            50: "#f0fdf4",
            100: "#dcfce7", 
            200: "#bbf7d0",
            300: "#86efac",
            400: "#4ade80",
            500: "#22c55e",
            600: "#16a34a",
            700: "#15803d",
            800: "#166534",
            900: "#14532d",
            950: "#052e16"
          },
          type: "pill",
          title: "Connecting to Rob...",
          subtitle: "Please wait",
          icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="8" stroke="#22c55e" stroke-width="2" fill="none" stroke-dasharray="25.133" stroke-dashoffset="25.133" transform-origin="12 12">
              <animateTransform attributeName="transform" type="rotate" dur="1s" values="0 12 12;360 12 12" repeatCount="indefinite"/>
              <animate attributeName="stroke-dasharray" dur="1.5s" values="0 25.133;12.566 12.566;0 25.133" repeatCount="indefinite"/>
            </circle>
            <circle cx="12" cy="12" r="3" fill="#22c55e" opacity="0.5">
              <animate attributeName="opacity" dur="1s" values="0.5;1;0.5" repeatCount="indefinite"/>
            </circle>
          </svg>`
        },
        active: {
          color: {
            50: "#f0fdf4",
            100: "#dcfce7", 
            200: "#bbf7d0",
            300: "#86efac",
            400: "#4ade80",
            500: "#22c55e",
            600: "#16a34a",
            700: "#15803d",
            800: "#166534",
            900: "#14532d",
            950: "#052e16"
          },
          type: "pill",
          title: "Rob is listening...",
          subtitle: "Speak now",
          icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="8" fill="#22c55e" opacity="0.8">
              <animate attributeName="r" dur="1.5s" values="6;8;6" repeatCount="indefinite"/>
              <animate attributeName="opacity" dur="1.5s" values="0.8;0.3;0.8" repeatCount="indefinite"/>
            </circle>
            <circle cx="12" cy="12" r="5" fill="#34d399" opacity="0.6">
              <animate attributeName="r" dur="1.2s" values="4;5;4" repeatCount="indefinite"/>
              <animate attributeName="opacity" dur="1.2s" values="0.6;0.2;0.6" repeatCount="indefinite"/>
            </circle>
            <circle cx="12" cy="12" r="3" fill="#ffffff"/>
            <path d="M10 9v6l4-3z" fill="#22c55e"/>
          </svg>`
        }
      };

      (function (d, t) {
        var g = document.createElement(t),
          s = d.getElementsByTagName(t)[0];
        g.src =
          "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        g.defer = true;
        g.async = true;
        s.parentNode.insertBefore(g, s);

        g.onload = function () {
          vapiInstance = window.vapiSDK.run({
            apiKey: apiKey, // mandatory
            assistant: assistant, // mandatory
            config: buttonConfig, // optional
          });
          
          // Enhanced styling and animation for Vapi button
          setTimeout(() => {
            const vapiButton = document.querySelector('[data-vapi-button]') || document.querySelector('.vapi-btn') || document.querySelector('[class*="vapi"]');
            if (vapiButton) {
              vapiButton.style.zIndex = '99999';
              vapiButton.style.position = 'fixed';
              vapiButton.style.boxShadow = '0 10px 25px rgba(34, 197, 94, 0.3), 0 0 20px rgba(34, 197, 94, 0.2)';
              vapiButton.style.transition = 'all 0.3s ease';
              vapiButton.style.cursor = 'pointer';
              
              // Add hover effect
              vapiButton.addEventListener('mouseenter', function() {
                this.style.transform = 'scale(1.1)';
                this.style.boxShadow = '0 15px 35px rgba(34, 197, 94, 0.4), 0 0 30px rgba(34, 197, 94, 0.3)';
              });
              
              vapiButton.addEventListener('mouseleave', function() {
                this.style.transform = 'scale(1)';
                this.style.boxShadow = '0 10px 25px rgba(34, 197, 94, 0.3), 0 0 20px rgba(34, 197, 94, 0.2)';
              });
              
              // Add phone ringing animation when clicked
              vapiButton.addEventListener('click', function() {
                this.style.animation = 'phoneRing 0.6s ease-in-out';
                setTimeout(() => {
                  this.style.animation = '';
                }, 600);
              });
              
              // Add floating animation
              vapiButton.style.animation = 'vapiFloat 3s ease-in-out infinite';
            }
          }, 1000);
        };
      })(document, "script");
    </script>

    <!-- Custom CSS for Vapi button animations -->
    <style>
      @keyframes phoneRing {
        0%, 100% { transform: rotate(0deg) scale(1); }
        10% { transform: rotate(-10deg) scale(1.1); }
        20% { transform: rotate(10deg) scale(1.1); }
        30% { transform: rotate(-10deg) scale(1.1); }
        40% { transform: rotate(10deg) scale(1.1); }
        50% { transform: rotate(-5deg) scale(1.05); }
        60% { transform: rotate(5deg) scale(1.05); }
        70% { transform: rotate(-5deg) scale(1.05); }
        80% { transform: rotate(5deg) scale(1.05); }
        90% { transform: rotate(0deg) scale(1); }
      }

      @keyframes vapiFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
      }

      /* Make sure Vapi button text is readable */
      [data-vapi-button] * {
        color: white !important;
      }
    </style>
